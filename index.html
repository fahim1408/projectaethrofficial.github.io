<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AETHR — Above the Noise.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Cormorant Garamond', 'serif'],
            body: ['Barlow', 'sans-serif'],
            condensed: ['Barlow Condensed', 'sans-serif'],
          },
          colors: {
            aethr: {
              black: '#080808',
              white: '#F5F4F0',
              gray: '#1a1a1a',
              mid: '#888',
              light: '#ccc',
            }
          },
          letterSpacing: {
            widest2: '0.25em',
            widest3: '0.4em',
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    html { scroll-behavior: smooth; }
    body { background: #080808; color: #F5F4F0; cursor: none; }

    /* Custom cursor */
    #cursor { position: fixed; width: 8px; height: 8px; background: #F5F4F0; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: transform 0.1s ease, opacity 0.2s; }
    #cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(245,244,240,0.4); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: all 0.15s ease; }
    body:hover #cursor { opacity: 1; }
    .cursor-hover #cursor-ring { transform: translate(-50%,-50%) scale(1.8); border-color: rgba(245,244,240,0.7); }

    /* Page transitions */
    .page { display: none; opacity: 0; transition: opacity 0.5s ease; }
    .page.active { display: block; opacity: 1; }

    /* Nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; mix-blend-mode: difference; }
    .nav-link { position: relative; }
    .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background: #F5F4F0; transition: width 0.3s ease; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }

    /* Hero */
    .hero-title { font-size: clamp(5rem, 20vw, 18rem); line-height: 0.85; letter-spacing: -0.02em; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-up { animation: fadeUp 1s ease forwards; }
    .fade-in { animation: fadeIn 1.2s ease forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.5s; opacity: 0; }
    .delay-3 { animation-delay: 0.8s; opacity: 0; }
    .delay-4 { animation-delay: 1.1s; opacity: 0; }

    /* Marquee */
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee-inner { animation: marquee 18s linear infinite; display: flex; width: max-content; }

    /* Product card */
    .product-card { position: relative; overflow: hidden; background: #0f0f0f; }
    .product-card img { transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.7s ease; filter: grayscale(20%); }
    .product-card:hover img { transform: scale(1.04); filter: grayscale(0%); }
    .product-card .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; background: linear-gradient(to top, rgba(8,8,8,0.95) 0%, transparent 100%); transform: translateY(10px); transition: transform 0.4s ease; opacity: 0; }
    .product-card:hover .card-overlay { transform: translateY(0); opacity: 1; }
    .tag-1of1 { font-family: 'Barlow Condensed', sans-serif; font-size: 0.6rem; letter-spacing: 0.25em; background: #F5F4F0; color: #080808; padding: 3px 8px; }

    /* Buttons */
    .btn-primary { position: relative; overflow: hidden; border: 1px solid #F5F4F0; color: #F5F4F0; transition: color 0.35s ease; }
    .btn-primary::before { content: ''; position: absolute; inset: 0; background: #F5F4F0; transform: translateX(-101%); transition: transform 0.35s cubic-bezier(0.76, 0, 0.24, 1); }
    .btn-primary:hover { color: #080808; }
    .btn-primary:hover::before { transform: translateX(0); }
    .btn-primary span { position: relative; z-index: 1; }

    /* Cart */
    #cart-panel { position: fixed; top: 0; right: 0; height: 100%; width: 420px; max-width: 100vw; background: #0d0d0d; border-left: 1px solid #1f1f1f; z-index: 200; transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.76, 0, 0.24, 1); }
    #cart-panel.open { transform: translateX(0); }
    #cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
    #cart-overlay.open { opacity: 1; pointer-events: all; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #080808; }
    ::-webkit-scrollbar-thumb { background: #333; }

    /* Line divider */
    .divider { height: 1px; background: linear-gradient(to right, transparent, #333, transparent); }

    /* Image placeholder */
    .img-placeholder { background: linear-gradient(135deg, #141414 0%, #1c1c1c 50%, #111 100%); aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; }

    /* About section */
    .about-char { display: inline-block; opacity: 0; animation: fadeUp 0.6s ease forwards; }

    /* Footer line */
    .footer-link { transition: opacity 0.25s ease; opacity: 0.4; }
    .footer-link:hover { opacity: 1; }

    /* Grain overlay */
    body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 128px; }

    /* Hover on interactive elements */
    a, button { cursor: none; }
  
    /* ── HERO LOGO ── */
    .hero-logo-wrap {
      display: flex;
      align-items: flex-start;
      margin-bottom: 0;
    }
    .hero-logo-img {
      width: min(780px, 92vw);
      height: auto;
      display: block;
      animation: heroLogoReveal 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                 heroLogoFloat 6s ease-in-out 1.8s infinite,
                 heroLogoGlow  4s ease-in-out 1.8s infinite;
      opacity: 0;
      filter: drop-shadow(0 0 0px rgba(180,20,20,0));
      will-change: transform, filter;
      margin-left: -12px; /* optical alignment */
    }
    @keyframes heroLogoReveal {
      0%   { opacity: 0; transform: translateY(28px) scale(0.97); filter: drop-shadow(0 0 0px rgba(180,20,20,0)); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: translateY(0) scale(1);       filter: drop-shadow(0 0 30px rgba(180,20,20,0.45)) drop-shadow(0 0 70px rgba(180,20,20,0.18)); }
    }
    @keyframes heroLogoFloat {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-7px); }
    }
    @keyframes heroLogoGlow {
      0%,100% { filter: drop-shadow(0 0 28px rgba(180,20,20,0.42)) drop-shadow(0 0 65px rgba(180,20,20,0.16)); }
      50%      { filter: drop-shadow(0 0 45px rgba(200,30,30,0.65)) drop-shadow(0 0 110px rgba(200,30,30,0.28)) drop-shadow(0 0 4px rgba(255,200,200,0.15)); }
    }

    /* ── NAV LOGO ── */
    .nav-logo-img {
      height: 44px;
      width: auto;
      display: block;
      filter: drop-shadow(0 0 6px rgba(180,20,20,0.3));
      transition: filter 0.3s ease, transform 0.3s ease;
    }
    .nav-logo-btn:hover .nav-logo-img {
      filter: drop-shadow(0 0 14px rgba(200,30,30,0.6));
      transform: scale(1.03);
    }

    /* ── FOOTER LOGO ── */
    .footer-logo-img {
      height: 54px;
      width: auto;
      display: block;
      margin-bottom: 0.5rem;
      opacity: 0.82;
      filter: drop-shadow(0 0 8px rgba(180,20,20,0.25));
      transition: opacity 0.3s ease, filter 0.3s ease;
    }
    .footer-logo-img:hover {
      opacity: 1;
      filter: drop-shadow(0 0 18px rgba(180,20,20,0.5));
    }

    /* ── PLACEHOLDER LOGO (about / product) ── */
    .placeholder-logo-img {
      height: 90px;
      width: auto;
      opacity: 0.13;
      filter: grayscale(100%) brightness(1.4);
      pointer-events: none;
      user-select: none;
    }

  
    /* ── ADMIN PANEL ── */
    #admin-gate { position:fixed; inset:0; background:#080808; z-index:1000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:2rem; }
    #admin-panel-page { display:none; }
    .admin-input {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      color: #F5F4F0;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 0.75rem 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.25s ease;
    }
    .admin-input:focus { border-color: #555; }
    .admin-input::placeholder { color: #444; }
    .admin-select {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      color: #F5F4F0;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 0.75rem 1rem;
      width: 100%;
      outline: none;
      cursor: none;
      appearance: none;
      transition: border-color 0.25s ease;
    }
    .admin-select:focus { border-color: #555; }
    .admin-textarea {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      color: #F5F4F0;
      font-family: 'Barlow', sans-serif;
      font-size: 0.8rem;
      line-height: 1.6;
      padding: 0.75rem 1rem;
      width: 100%;
      outline: none;
      resize: vertical;
      min-height: 90px;
      transition: border-color 0.25s ease;
    }
    .admin-textarea:focus { border-color: #555; }
    .admin-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #666;
      display: block;
      margin-bottom: 0.4rem;
    }
    .admin-field { margin-bottom: 1.2rem; }
    .admin-card {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      padding: 1.25rem;
      transition: border-color 0.25s ease;
    }
    .admin-card:hover { border-color: #333; }
    .admin-card.selected { border-color: #F5F4F0; }
    .admin-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.65rem 1.5rem;
      border: 1px solid #F5F4F0;
      color: #F5F4F0;
      background: transparent;
      cursor: none;
      transition: background 0.25s ease, color 0.25s ease;
      position: relative; overflow: hidden;
    }
    .admin-btn::before { content:''; position:absolute; inset:0; background:#F5F4F0; transform:translateX(-101%); transition:transform 0.3s cubic-bezier(0.76,0,0.24,1); }
    .admin-btn:hover { color: #080808; }
    .admin-btn:hover::before { transform:translateX(0); }
    .admin-btn span { position:relative; z-index:1; }
    .admin-btn-red {
      border-color: #7a1515;
      color: #c0392b;
    }
    .admin-btn-red::before { background: #7a1515; }
    .admin-btn-red:hover { color: #F5F4F0; }
    .admin-btn-ghost {
      border-color: #333;
      color: #888;
    }
    .admin-btn-ghost::before { background: #333; }
    .admin-btn-ghost:hover { color: #F5F4F0; }
    .admin-sidebar { width: 280px; flex-shrink:0; border-right: 1px solid #1a1a1a; overflow-y:auto; }
    .admin-main { flex:1; overflow-y:auto; }
    .admin-tag { display:inline-block; font-family:'Barlow Condensed',sans-serif; font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; padding:2px 7px; background:#1a1a1a; color:#888; }
    .admin-tag.in-stock { background: rgba(30,80,40,0.4); color:#4caf65; }
    .admin-tag.low-stock { background: rgba(90,60,10,0.4); color:#d4a017; }
    .admin-tag.out-stock { background: rgba(80,15,15,0.4); color:#c0392b; }
    .size-pill {
      font-family:'Barlow Condensed',sans-serif;
      font-size:0.65rem;
      letter-spacing:0.15em;
      padding: 4px 10px;
      border: 1px solid #333;
      color: #888;
      background: transparent;
      cursor: none;
      transition: all 0.2s ease;
      text-transform:uppercase;
    }
    .size-pill.active { border-color:#F5F4F0; color:#F5F4F0; background:#141414; }
    .admin-stat { background:#0d0d0d; border:1px solid #1a1a1a; padding:1.25rem; }
    #admin-toast {
      position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
      background:#F5F4F0; color:#080808;
      font-family:'Barlow Condensed',sans-serif; font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase;
      padding:0.75rem 2rem; opacity:0; pointer-events:none;
      transition: opacity 0.3s ease; z-index:9999;
    }
    .admin-divider { height:1px; background:linear-gradient(to right, transparent, #222, transparent); margin: 1.5rem 0; }
    input[type=range] { -webkit-appearance:none; width:100%; height:2px; background:#222; outline:none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; background:#F5F4F0; border-radius:50%; cursor:none; }

  
    /* ── IMAGE UPLOADER ── */
    .img-drop-zone {
      border: 1px dashed #333;
      background: #0a0a0a;
      padding: 2rem 1.5rem;
      text-align: center;
      transition: border-color 0.25s ease, background 0.25s ease;
      cursor: pointer;
      position: relative;
    }
    .img-drop-zone:hover, .img-drop-zone.drag-over {
      border-color: #666;
      background: #111;
    }
    .img-drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .img-thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-top: 1rem;
    }
    .img-thumb-item {
      position: relative;
      aspect-ratio: 3/4;
      background: #111;
      overflow: hidden;
    }
    .img-thumb-item img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
      transition: opacity 0.2s ease;
    }
    .img-thumb-item .thumb-remove {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px;
      background: rgba(8,8,8,0.85);
      border: 1px solid #444;
      color: #F5F4F0;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      border-radius: 50%;
      font-weight: 500;
      line-height: 1;
    }
    .img-thumb-item:hover .thumb-remove { opacity: 1; }
    .img-thumb-item .thumb-main-badge {
      position: absolute; bottom: 4px; left: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase;
      background: #F5F4F0; color: #080808;
      padding: 2px 5px;
    }
    .img-thumb-item .thumb-set-main {
      position: absolute; bottom: 4px; right: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(8,8,8,0.8); color: #888;
      padding: 2px 5px;
      cursor: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .img-thumb-item:hover .thumb-set-main { opacity: 1; }

    /* ── PRODUCT PAGE GALLERY ── */
    .product-gallery { display: flex; flex-direction: column; height: 100%; }
    .product-gallery-main {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #0a0a0a;
    }
    .product-gallery-main img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s ease;
    }
    .product-gallery-thumbs {
      display: flex;
      gap: 2px;
      background: #080808;
      padding: 8px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .product-gallery-thumbs::-webkit-scrollbar { display: none; }
    .gallery-thumb {
      width: 64px;
      height: 80px;
      flex-shrink: 0;
      overflow: hidden;
      cursor: none;
      border: 1px solid transparent;
      transition: border-color 0.2s ease;
      background: #111;
    }
    .gallery-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .gallery-thumb.active { border-color: #F5F4F0; }
    .gallery-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(8,8,8,0.7);
      border: 1px solid #2a2a2a;
      color: #F5F4F0;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: none;
      font-size: 14px;
      transition: background 0.2s, border-color 0.2s;
      z-index: 5;
    }
    .gallery-arrow:hover { background: rgba(8,8,8,0.95); border-color: #555; }
    .gallery-arrow.prev { left: 12px; }
    .gallery-arrow.next { right: 12px; }
    .gallery-counter {
      position: absolute; bottom: 12px; right: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(245,244,240,0.5);
      background: rgba(8,8,8,0.6);
      padding: 3px 8px;
    }

    /* card with real photo */
    .product-card-img { width:100%; height:100%; object-fit:cover; display:block; }

  
    /* ══ AUTH SLIDE PANEL ══ */
    #auth-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:300; opacity:0; pointer-events:none; transition:opacity 0.4s ease; }
    #auth-overlay.open { opacity:1; pointer-events:all; }
    #auth-panel {
      position:fixed; top:0; right:0; height:100%; width:460px; max-width:100vw;
      background:#0a0a0a; border-left:1px solid #1f1f1f;
      z-index:301; transform:translateX(100%);
      transition:transform 0.5s cubic-bezier(0.76,0,0.24,1);
      display:flex; flex-direction:column; overflow:hidden;
    }
    #auth-panel.open { transform:translateX(0); }

    .auth-input {
      background:#0f0f0f; border:1px solid #222; color:#F5F4F0;
      font-family:'Barlow',sans-serif; font-size:0.85rem;
      padding:0.85rem 1rem; width:100%; outline:none;
      transition:border-color 0.25s ease;
    }
    .auth-input:focus { border-color:#555; }
    .auth-input::placeholder { color:#3a3a3a; }
    .auth-label {
      font-family:'Barlow Condensed',sans-serif; font-size:0.6rem;
      letter-spacing:0.25em; text-transform:uppercase; color:#666;
      display:block; margin-bottom:0.4rem;
    }
    .auth-field { margin-bottom:1.1rem; }
    .auth-error {
      font-family:'Barlow Condensed',sans-serif; font-size:0.65rem;
      letter-spacing:0.15em; text-transform:uppercase; color:#c0392b;
      margin-top:0.35rem; min-height:1rem; display:block;
    }
    .auth-tab-btn {
      font-family:'Barlow Condensed',sans-serif; font-size:0.65rem;
      letter-spacing:0.25em; text-transform:uppercase;
      padding:0.65rem 0; border-bottom:1px solid transparent;
      transition:color 0.2s, border-color 0.2s; color:#555;
      flex:1; text-align:center;
    }
    .auth-tab-btn.active { color:#F5F4F0; border-bottom-color:#F5F4F0; }

    /* ══ PROFILE PAGE ══ */
    #page-profile { }
    .profile-section {
      background:#0d0d0d; border:1px solid #1a1a1a; padding:1.75rem;
      margin-bottom:1rem;
    }
    .profile-section-title {
      font-family:'Barlow Condensed',sans-serif; font-size:0.6rem;
      letter-spacing:0.3em; text-transform:uppercase; color:#555;
      margin-bottom:1.25rem; display:block;
    }
    .profile-input {
      background:#080808; border:1px solid #1e1e1e; color:#F5F4F0;
      font-family:'Barlow',sans-serif; font-size:0.85rem;
      padding:0.75rem 1rem; width:100%; outline:none;
      transition:border-color 0.25s ease;
    }
    .profile-input:focus { border-color:#444; }
    .profile-input::placeholder { color:#333; }
    .profile-label {
      font-family:'Barlow Condensed',sans-serif; font-size:0.6rem;
      letter-spacing:0.25em; text-transform:uppercase; color:#555;
      display:block; margin-bottom:0.4rem;
    }
    .profile-field { margin-bottom:1rem; }
    .profile-avatar {
      width:72px; height:72px; background:#111; border:1px solid #222;
      display:flex; align-items:center; justify-content:center;
      font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; color:#444;
      flex-shrink:0;
    }
    .order-card {
      border:1px solid #1a1a1a; padding:1.25rem;
      transition:border-color 0.2s;
    }
    .order-card:hover { border-color:#333; }
    .status-badge {
      font-family:'Barlow Condensed',sans-serif; font-size:0.55rem;
      letter-spacing:0.2em; text-transform:uppercase; padding:3px 8px;
    }
    .status-pending   { background:rgba(90,60,10,0.35);  color:#d4a017; }
    .status-confirmed { background:rgba(20,60,30,0.35);  color:#4caf65; }
    .status-shipped   { background:rgba(20,40,80,0.35);  color:#5b9cf6; }
    .status-rejected  { background:rgba(80,15,15,0.35);  color:#c0392b; }
    .status-pending-admin { background:rgba(90,60,10,0.18); border:1px solid rgba(212,160,23,0.3); color:#d4a017; }

  
    /* ══ CHECKOUT ══ */
    .co-step { display:none; }
    .co-step.active { display:block; }
    .step-indicator { display:flex; align-items:center; margin-bottom:2.5rem; }
    .sdot { width:26px; height:26px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; letter-spacing:0.1em; border:1px solid #333; color:#555; background:#080808; transition:all 0.3s ease; }
    .sdot.active { border-color:#F5F4F0; color:#F5F4F0; }
    .sdot.done { background:#F5F4F0; color:#080808; border-color:#F5F4F0; }
    .sline { flex:1; height:1px; background:#1a1a1a; transition:background 0.3s ease; }
    .sline.done { background:#F5F4F0; }
    .payment-opt { border:1px solid #1e1e1e; padding:1.1rem 1.25rem; cursor:none; transition:border-color 0.25s,background 0.25s; display:flex; align-items:center; gap:1rem; }
    .payment-opt:hover { border-color:#3a3a3a; background:#0d0d0d; }
    .payment-opt.selected { border-color:#F5F4F0; background:#0d0d0d; }
    .payment-opt input[type=radio] { accent-color:#F5F4F0; width:15px; height:15px; flex-shrink:0; cursor:none; }
    .pmfs-logo { width:52px; height:26px; border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; font-weight:700; letter-spacing:0.05em; }
    .pmfs-logo.bkash { background:#e2136e; color:#fff; }
    .pmfs-logo.nagad  { background:#f05a28; color:#fff; }
    .pmfs-logo.cod    { background:#1a1a1a; color:#888; border:1px solid #333; }
    .mfs-panel { display:none; background:#0a0a0a; border:1px solid #1a1a1a; padding:1.25rem; margin-top:0.5rem; }
    .mfs-panel.open { display:block; }
    .co-summary-row { display:flex; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid #0f0f0f; }
    .co-summary-row:last-child { border-bottom:none; }
    /* ══ CONFIRMATION ══ */
    .confirm-ring { width:60px; height:60px; border:1px solid #222; display:flex; align-items:center; justify-content:center; margin:0 auto 2rem; border-radius:50%; animation:ringPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes ringPop { from{transform:scale(0.4);opacity:0;} to{transform:scale(1);opacity:1;} }
    .confetti-star { position:fixed; pointer-events:none; animation:starFall linear forwards; }
    @keyframes starFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(110vh) rotate(540deg);opacity:0;} }
    .confirm-row { display:flex; justify-content:space-between; padding:0.65rem 0; border-bottom:1px solid #111; }
    .confirm-row:last-child { border-bottom:none; }

  
    /* ── CUSTOMERS TAB ── */
    .customer-row {
      display:flex; align-items:center; gap:1rem;
      padding:0.9rem 1rem; border-bottom:1px solid #111;
      transition:background 0.2s;
    }
    .customer-row:hover { background:#0d0d0d; }
    .customer-row:last-child { border-bottom:none; }
    .customer-avatar-sm {
      width:34px; height:34px; border-radius:50%;
      background:#141414; border:1px solid #222;
      display:flex; align-items:center; justify-content:center;
      font-family:'Barlow Condensed',sans-serif; font-size:0.65rem; color:#666;
      flex-shrink:0;
    }
    .notify-dot {
      width:7px; height:7px; border-radius:50%;
      background:#c0392b; display:inline-block; margin-left:6px;
      animation:notifyPulse 1.4s ease-in-out infinite;
    }
    @keyframes notifyPulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.7);} }
    .order-notify-card {
      background:#0d0d0d; border:1px solid #1a1a1a;
      padding:1rem 1.25rem; margin-bottom:0.5rem;
      display:flex; align-items:center; justify-content:space-between; gap:1rem;
      animation:slideInNotify 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideInNotify { from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }
    .notify-panel {
      position:fixed; top:64px; right:2rem; width:380px; max-width:calc(100vw - 2rem);
      background:#0a0a0a; border:1px solid #222; z-index:500;
      max-height:70vh; overflow-y:auto;
      transform:translateY(-12px); opacity:0; pointer-events:none;
      transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .notify-panel.open { transform:translateY(0); opacity:1; pointer-events:all; }
    #notify-bell {
      position:relative; cursor:none;
      font-family:'Barlow Condensed',sans-serif; font-size:0.65rem;
      letter-spacing:0.25em; text-transform:uppercase;
    }
    #notify-count {
      position:absolute; top:-6px; right:-10px;
      background:#c0392b; color:#fff; border-radius:50%;
      width:16px; height:16px; font-size:0.5rem;
      display:flex; align-items:center; justify-content:center;
      font-family:'Barlow Condensed',sans-serif; font-weight:600;
      opacity:0; transition:opacity 0.3s;
    }
    #notify-count.visible { opacity:1; }

  
    /* ── OTP / FORGOT PASSWORD ── */
    #auth-form-forgot, #auth-form-otp, #auth-form-newpw { display:none; }
    .otp-boxes { display:flex; gap:0.5rem; justify-content:center; margin:1.25rem 0; }
    .otp-box {
      width:44px; height:52px; text-align:center;
      background:#0f0f0f; border:1px solid #222; color:#F5F4F0;
      font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300;
      outline:none; transition:border-color 0.2s ease;
      caret-color: #F5F4F0;
    }
    .otp-box:focus { border-color:#F5F4F0; }
    .otp-timer { font-family:'Barlow Condensed',sans-serif; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:#555; text-align:center; margin-top:0.5rem; }
    .otp-timer span { color:#F5F4F0; }

    /* ── ORDER CONFIRMATION EMAIL badge ── */
    .email-sent-badge {
      display:flex; align-items:center; gap:0.5rem;
      background:rgba(20,60,30,0.25); border:1px solid rgba(76,175,101,0.2);
      padding:0.6rem 1rem; margin-top:1rem;
    }

  </style>
</head>
